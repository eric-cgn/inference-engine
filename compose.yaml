volumes:
  zmq_ipc:   # ZMQ socket shared between Frigate and the inference engine

services:
  frigate-inference:
    container_name: frigate-inference
    image: ${INFERENCE_IMAGE:-frigate-inference:sm_61}
    restart: unless-stopped
    volumes:
      - zmq_ipc:/run/zmq
      - ${FRIGATE_MODELS_DIR:-/opt/frigate/models}:/models
      - ${FRIGATE_CONFIG_DIR:-/opt/frigate/config}:/config:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
